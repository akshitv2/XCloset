<!DOCTYPE html>
<html class="motion-safe:scroll-smooth" lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Atelier — Digital Wardrobe</title>
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'Segoe UI', 'sans-serif'],
                    },
                    colors: {
                        lumia: {
                            bg: '#000000',
                            tile: '#1F1F1F',
                            accent: '#0078D7',
                            text: '#FFFFFF',
                            muted: '#A2A2A2'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', '-apple-system', 'Segoe UI', sans-serif;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            @apply bg-zinc-100 dark:bg-black;
        }

        ::-webkit-scrollbar-thumb {
            @apply bg-zinc-300 dark:bg-zinc-800;
        }
    </style>
</head>
<body class="antialiased bg-white dark:bg-black text-zinc-900 dark:text-white min-h-screen flex flex-col selection:bg-lumia-accent selection:text-white transition-colors duration-200">

<header class="bg-white dark:bg-black pt-8 pb-4 px-4 sticky top-0 z-50 transition-colors duration-200">
    <div class="w-full flex flex-col md:flex-row justify-between items-baseline gap-4">
        <div class="flex items-baseline gap-3">
            <span class="text-4xl font-light tracking-tight text-lumia-accent uppercase">Atelier</span>
            <span class="text-xs font-semibold tracking-widest text-zinc-400 dark:text-lumia-muted uppercase">Wardrobe System</span>
        </div>
        <nav class="flex space-x-8 text-2xl font-light tracking-tight overflow-x-auto whitespace-nowrap w-full md:w-auto py-2">
            <button class="nav-link text-zinc-900 dark:text-white transition-colors uppercase" id="nav-closet"
                    onclick="switchView('closet')">
                Collection
            </button>
            <button class="nav-link text-zinc-400 dark:text-lumia-muted hover:text-zinc-900 dark:hover:text-white transition-colors uppercase"
                    id="nav-fits" onclick="switchView('fits')">
                Lookbooks
            </button>
            <button class="nav-link text-zinc-400 dark:text-lumia-muted hover:text-zinc-900 dark:hover:text-white transition-colors uppercase"
                    id="nav-go-to-viz" onclick="switchView('go-to-viz')">
                Visualizer
            </button>
        </nav>
    </div>
</header>

<main class="w-full flex-1">

    <div class="fixed inset-0 bg-white dark:bg-black z-40 flex flex-col items-center justify-center transition-opacity duration-300"
         id="loading-overlay">
        <span class="text-3xl font-light tracking-wide animate-pulse uppercase text-zinc-900 dark:text-white">Syncing Live Tiles...</span>
    </div>

    <section class="space-y-4" id="view-closet">
        <div class="px-4 flex flex-wrap gap-2 items-center bg-zinc-100/80 dark:bg-zinc-900/50 py-3 border-y border-zinc-200 dark:border-zinc-800 transition-colors duration-200">
            <select class="bg-white dark:bg-black border border-zinc-300 dark:border-zinc-700 text-xs text-zinc-900 dark:text-white uppercase tracking-wider px-3 py-2 focus:outline-none focus:border-lumia-accent transition rounded-none"
                    id="filter-type" onchange="renderCloset()">
                <option value="all">All Types</option>
            </select>
            <button class="text-xs uppercase tracking-widest text-zinc-500 dark:text-lumia-muted hover:text-zinc-900 dark:hover:text-white px-2 py-1 bg-zinc-200 dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-700 transition rounded-none"
                    onclick="resetFilters()">
                Reset
            </button>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-1 bg-zinc-100 dark:bg-black p-1 transition-colors duration-200"
             id="closet-grid">
        </div>
    </section>

    <section class="space-y-4 hidden" id="view-fits">
        <div class="px-4 flex justify-between items-center bg-zinc-100/80 dark:bg-zinc-900/50 py-3 border-y border-zinc-200 dark:border-zinc-800 transition-colors duration-200">
            <span class="text-xs font-semibold tracking-widest text-zinc-500 dark:text-lumia-muted uppercase">Compiled Pairs</span>
            <select class="bg-white dark:bg-black border border-zinc-300 dark:border-zinc-700 text-xs text-zinc-900 dark:text-white uppercase tracking-wider px-3 py-2 focus:outline-none focus:border-lumia-accent transition rounded-none"
                    id="filter-fit-occasion" onchange="renderFitsPage()">
                <option value="all">All Occasions</option>
            </select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 p-4 bg-zinc-100 dark:bg-black transition-colors duration-200"
             id="outfits-grid">
        </div>
    </section>

    <!-- Native Integrated Visualizer Section -->
    <section class="space-y-4 hidden" id="view-go-to-viz">
        <div class="px-4 flex justify-between items-center bg-zinc-100/80 dark:bg-zinc-900/50 py-3 border-y border-zinc-200 dark:border-zinc-800 transition-colors duration-200">
            <span class="text-xs font-semibold tracking-widest text-zinc-500 dark:text-lumia-muted uppercase">Outfit Visualizer Engine</span>
        </div>

        <div class="p-4 space-y-4 max-w-7xl mx-auto">
            <div class="space-y-2">
                <label for="jsonInput" class="text-xs font-bold uppercase tracking-wider text-zinc-400 dark:text-lumia-muted">Input ID Array (Supports 1D or 2D Arrays)</label>
                <textarea id="jsonInput" class="w-full h-24 bg-zinc-50 dark:bg-zinc-950 border border-zinc-300 dark:border-zinc-800 text-zinc-900 dark:text-white p-3 font-mono text-xs focus:outline-none focus:border-lumia-accent transition rounded-none placeholder-zinc-400 dark:placeholder-zinc-600" placeholder='e.g., ["uuid1", "uuid2"] or [["uuid1", "uuid2"], ["uuid3", "uuid4"]]'></textarea>
            </div>

            <div class="flex gap-2">
                <button onclick="renderVisualizerImages()" class="bg-lumia-accent text-white text-xs font-bold uppercase tracking-widest px-4 py-2 hover:bg-opacity-90 transition rounded-none">
                    Display Images
                </button>
                <button onclick="pasteAndRenderVisualizer()" class="bg-zinc-200 dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-700 text-zinc-900 dark:text-white text-xs font-bold uppercase tracking-widest px-4 py-2 hover:bg-zinc-300 dark:hover:bg-zinc-700 transition rounded-none">
                    Paste & Display
                </button>
            </div>

            <div id="visualizer-gallery" class="space-y-6 pt-4"></div>
        </div>
    </section>

</main>

<script>
    const MEDIA_URL = '/XCloset/wardrobe.json';
    const OUTFITS_URL = '/XCloset/outfits.json';
    const VISUALIZER_BASE_URL = "/XCloset/media/clothes/";
    const VISUALIZER_IMAGE_EXTENSION = ".png";

    // Type order mapping for sorting
    const TYPE_ORDER = ['cap', 'tshirt', 'tanktop', 'sweatshirt', 'shirt', 'pants', 'jeans', 'joggers', 'shorts', 'pajamas', 'jacket', 'sweater', 'shoes'];

    let clothes = {};
    let outfits = {};

    // Helper function to sort the clothes object by type hierarchy
    function sortClothes(clothesObj) {
        const sortedEntries = Object.entries(clothesObj).sort(([, a], [, b]) => {
            let indexA = TYPE_ORDER.indexOf(a.type);
            let indexB = TYPE_ORDER.indexOf(b.type);

            // Move unknown types to the end
            if (indexA === -1) indexA = TYPE_ORDER.length;
            if (indexB === -1) indexB = TYPE_ORDER.length;

            return indexA - indexB;
        });

        return Object.fromEntries(sortedEntries);
    }

    async function initializeArchive() {
        try {
            const outfitsResponse = await fetch(OUTFITS_URL);
            const cachedResponse = await fetch(MEDIA_URL);

            if (!outfitsResponse.ok) throw new Error('Outfits fetch failed');
            outfits = await outfitsResponse.json();
            const rawClothes = await cachedResponse.json();
            clothes = sortClothes(rawClothes);
        } catch (error) {
            console.error("System Data Sync Failure:", error);
            const rawClothes = JSON.parse(localStorage.getItem('studio_media')) || {};
            clothes = sortClothes(rawClothes);
            outfits = JSON.parse(localStorage.getItem('studio_fits')) || {};
        } finally {
            const loader = document.getElementById('loading-overlay');
            loader.classList.add('opacity-0', 'pointer-events-none');

            populateFilterDropdowns();
            renderCloset();
        }
    }

    function switchView(viewName) {
        document.getElementById('view-closet').classList.add('hidden');
        document.getElementById('view-fits').classList.add('hidden');
        document.getElementById('view-go-to-viz').classList.add('hidden');

        document.querySelectorAll('.nav-link').forEach(el => {
            el.classList.remove('text-zinc-900', 'text-white');
            el.classList.add('text-zinc-400', 'dark:text-lumia-muted');
        });

        document.getElementById(`view-${viewName}`).classList.remove('hidden');

        const targetBtn = document.getElementById(`nav-${viewName}`);
        if (targetBtn) {
            targetBtn.classList.remove('text-zinc-400', 'dark:text-lumia-muted');
            targetBtn.classList.add('text-zinc-900', 'dark:text-white');
        }

        if (viewName === 'closet') renderCloset();
        if (viewName === 'fits') renderFitsPage();
        if (viewName === 'go-to-viz') renderVisualizerImages();
    }

    function populateFilterDropdowns() {
        const types = new Set();
        const occasions = new Set();
        Object.values(clothes).forEach(item => {
            types.add(item.type);
            occasions.add(item.occasion);
        });
        populateSelect('filter-type', types, 'All Types');

        const fitOccasions = new Set();
        Object.values(outfits).forEach(fit => {
            if (fit.occasion) fitOccasions.add(fit.occasion);
        });
        populateSelect('filter-fit-occasion', fitOccasions, 'All Occasions');
    }

    function populateSelect(elementId, dataset, defaultLabel) {
        const select = document.getElementById(elementId);
        if (!select) return;
        select.innerHTML = `<option value="all">${defaultLabel}</option>`;
        dataset.forEach(value => {
            select.innerHTML += `<option value="${value}">${value.toUpperCase()}</option>`;
        });
    }

    function resetFilters() {
        document.getElementById('filter-type').value = 'all';
        renderCloset();
    }

    function copyId(uuid, btnElement) {
        navigator.clipboard.writeText(uuid).then(() => {
            const originalText = btnElement.innerText;
            btnElement.innerText = 'COPIED';
            btnElement.classList.replace('text-lumia-accent', 'text-green-600');
            setTimeout(() => {
                btnElement.innerText = originalText;
                btnElement.classList.replace('text-green-600', 'text-lumia-accent');
            }, 1000);
        }).catch(err => {
            console.error('Failed to copy ID: ', err);
        });
    }

    async function copyImage(uuid, btnElement) {
        const item = clothes[uuid];
        if (!item || !item.image) return;

        const originalText = btnElement.innerText;
        btnElement.innerText = 'COP...';

        try {
            const response = await fetch(item.image);
            const blob = await response.blob();
            let targetBlob = blob;

            if (!blob.type.includes('png')) {
                const img = new Image();
                img.src = item.image;
                await new Promise(resolve => img.onload = resolve);
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                targetBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
            }

            await navigator.clipboard.write([
                new ClipboardItem({ [targetBlob.type]: targetBlob })
            ]);

            btnElement.innerText = 'COPIED';
            btnElement.classList.replace('text-lumia-accent', 'text-green-600');
            setTimeout(() => {
                btnElement.innerText = originalText;
                btnElement.classList.replace('text-green-600', 'text-lumia-accent');
            }, 1000);
        } catch (err) {
            console.error('Failed to copy image payload: ', err);
            btnElement.innerText = 'ERR';
            setTimeout(() => { btnElement.innerText = originalText; }, 1000);
        }
    }

    function renderCloset() {
        const grid = document.getElementById('closet-grid');
        grid.innerHTML = '';

        const typeFilter = document.getElementById('filter-type').value;

        Object.entries(clothes).forEach(([uuid, item]) => {
            if (typeFilter !== 'all' && item.type !== typeFilter) return;

            const cardHtml = `
                    <div class="group relative aspect-square bg-zinc-100 dark:bg-zinc-950 overflow-hidden border border-transparent hover:border-zinc-900 dark:hover:border-white transition-all duration-200">
                        <img src="/XCloset/media/clothes/${uuid}.png" alt="${item.type}" class="w-full h-full object-cover">

                        <div class="absolute top-2 left-2 right-2 flex justify-between items-start pointer-events-none">
                            <span class="bg-white dark:bg-black border border-zinc-200 dark:border-zinc-800 px-1.5 py-0.5 text-[9px] font-semibold uppercase tracking-wider text-zinc-900 dark:text-white">
                                ${item.brand || 'GENERIC'}
                            </span>
                        </div>

                        <div class="absolute bottom-0 inset-x-0 bg-white dark:bg-black border-t border-zinc-200 dark:border-transparent p-2 transform translate-y-full group-hover:translate-y-0 transition-transform duration-200 ease-in-out">
                            <h3 class="text-xs font-bold uppercase tracking-tight text-zinc-900 dark:text-white truncate">${item.color} ${item.type}</h3>
                            <p class="text-[10px] text-zinc-500 dark:text-lumia-muted uppercase tracking-wider truncate mt-0.5">${item.occasion}</p>

                            <div class="flex mt-2 pt-2 border-t border-zinc-200 dark:border-zinc-800 text-[9px] font-bold uppercase tracking-widest gap-2 justify-between">
                                <button onclick="event.stopPropagation(); copyId('${uuid}', this)" class="w-1/2 text-center text-lumia-accent hover:text-zinc-900 dark:hover:text-white transition py-1">
                                    COPY ID
                                </button>
                                <button onclick="event.stopPropagation(); copyImage('${uuid}', this)" class="w-1/2 text-center text-lumia-accent hover:text-zinc-900 dark:hover:text-white transition py-1">
                                    COPY IMG
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            grid.innerHTML += cardHtml;
        });
    }

    function renderFitsPage() {
        const grid = document.getElementById('outfits-grid');
        grid.innerHTML = '';

        const fitOccasionFilter = document.getElementById('filter-fit-occasion').value;

        Object.entries(outfits).forEach(([outfitId, fitData]) => {
            const fitOccasion = fitData.occasion || "General";
            const itemIds = fitData.clothes || [];

            if (fitOccasionFilter !== 'all' && fitOccasion !== fitOccasionFilter) return;

            let itemCardsHtml = '';

            itemIds.forEach(uuid => {
                const item = clothes[uuid];
                if (!item) return;

                itemCardsHtml += `
                        <div class="relative w-full aspect-square bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-900 overflow-hidden group/item">
                            <img src="/XCloset/media/clothes/${uuid}.png" class="w-full h-full object-contain" title="${item.brand} // ${item.color} ${item.type}">
                            <div class="absolute inset-0 bg-black/60 opacity-0 group-hover/item:opacity-100 transition-opacity flex items-center justify-center p-1 text-[8px] text-center text-white uppercase tracking-tight pointer-events-none">
                                ${item.type}
                            </div>
                        </div>
                    `;
            });

            const outfitMainImage = `/XCloset/media/outfits/${outfitId}.png`;

            const lookbookCard = `
                    <div class="bg-white dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 p-3 space-y-3 flex flex-col justify-between transition-colors duration-200">
                        <div class="space-y-1">
                            <div class="flex justify-between items-baseline border-b border-zinc-200 dark:border-zinc-800 pb-1">
                                <span class="text-[10px] text-lumia-accent uppercase tracking-widest font-semibold">${fitOccasion}</span>
                                <span class="text-[10px] font-mono text-zinc-400 dark:text-lumia-muted uppercase">${itemIds.length} Layers</span>
                            </div>
                        </div>

                        <div class="relative w-full aspect-square bg-zinc-100 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 overflow-hidden">
                            ${outfitMainImage ? `<img src="${outfitMainImage}" onerror="this.src='fallback.png'" class="w-full h-full object-contain mx-auto" alt="${fitOccasion} Full Look">` : `<div class="w-full h-full flex items-center justify-center text-[10px] uppercase tracking-widest text-zinc-400">No Outfit Image</div>`}
                        </div>

                        <div class="grid grid-cols-4 gap-1 bg-zinc-100 dark:bg-black p-1 w-full">
                            ${itemCardsHtml || '<div class="col-span-4 text-center py-4 text-[10px] text-zinc-400 dark:text-lumia-muted uppercase tracking-widest">Stack vacant</div>'}
                        </div>
                    </div>
                `;
            grid.innerHTML += lookbookCard;
        });
    }

    /* Integrated Visualizer Processing Engines */
    async function pasteAndRenderVisualizer() {
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById('jsonInput').value = text;
            renderVisualizerImages();
        } catch (err) {
            alert('Failed to read clipboard. Please check browser permissions.');
            console.error('Clipboard access error:', err);
        }
    }

    function renderVisualizerImages() {
        const gallery = document.getElementById('visualizer-gallery');
        const rawInput = document.getElementById('jsonInput').value.trim();
        gallery.innerHTML = '';

        if (!rawInput) return;

        try {
            const parsedData = new Function(`return ${rawInput}`)();

            if (!Array.isArray(parsedData)) {
                alert('Input must be a valid array.');
                return;
            }

            const is2D = parsedData.length > 0 && Array.isArray(parsedData[0]);
            const matrix = is2D ? parsedData : [parsedData];

            matrix.forEach((row, rowIndex) => {
                if (!Array.isArray(row)) return;

                const rowBlock = document.createElement('div');
                rowBlock.className = 'border border-zinc-200 dark:border-zinc-800 p-3 space-y-3 bg-white dark:bg-zinc-950 transition-colors duration-200';

                const rowHeader = document.createElement('div');
                rowHeader.className = 'flex justify-between items-center border-b border-zinc-200 dark:border-zinc-800 pb-2';

                const label = document.createElement('div');
                label.className = 'text-[10px] text-lumia-accent uppercase tracking-widest font-semibold';
                label.innerText = is2D ? `Row ${rowIndex + 1}` : 'Custom Compile';
                rowHeader.appendChild(label);

                const actionsContainer = document.createElement('div');
                actionsContainer.className = 'flex gap-2';

                const copyBtn = document.createElement('button');
                copyBtn.className = 'text-[10px] font-bold uppercase tracking-widest bg-green-600 text-white px-3 py-1 hover:bg-green-700 transition rounded-none';
                copyBtn.innerText = 'Copy Outfit Row';
                copyBtn.onclick = () => copyRowToClipboard(rowFlex);
                actionsContainer.appendChild(copyBtn);

                const copyJsonBtn = document.createElement('button');
                copyJsonBtn.className = 'text-[10px] font-bold uppercase tracking-widest bg-lumia-accent text-white px-3 py-1 hover:bg-opacity-90 transition rounded-none';
                copyJsonBtn.innerText = 'Copy Config JSON';
                copyJsonBtn.onclick = () => copyRowIdsToJSON(rowFlex, copyJsonBtn);
                actionsContainer.appendChild(copyJsonBtn);

                rowHeader.appendChild(actionsContainer);
                rowBlock.appendChild(rowHeader);

                const rowWrapper = document.createElement('div');
                rowWrapper.className = 'w-full overflow-x-auto pb-2';

                const rowFlex = document.createElement('div');
                rowFlex.className = 'flex gap-3 items-start min-w-max';

                row.forEach(id => {
                    const cleanId = String(id).trim();
                    if (!cleanId) return;

                    const wrapper = document.createElement('div');
                    wrapper.className = 'flex flex-col items-center flex-shrink-0 w-[200px] bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 p-2';

                    const img = document.createElement('img');
                    img.crossOrigin = "anonymous";
                    img.src = `${VISUALIZER_BASE_URL}${cleanId}${VISUALIZER_IMAGE_EXTENSION}`;
                    img.alt = `Image ${cleanId}`;
                    img.className = 'h-[250px] object-contain mx-auto';
                    img.onerror = () => {
                        img.style.display = 'none';
                        img.classList.add('img-error');
                        const errorDiv = document.createElement('div');
                        errorDiv.className = 'h-[250px] w-full bg-zinc-100 dark:bg-zinc-950 flex items-center justify-center text-center text-[10px] text-zinc-400 dark:text-lumia-muted border border-dashed border-zinc-300 dark:border-zinc-800 uppercase tracking-widest';
                        errorDiv.innerText = 'Not Found';
                        wrapper.insertBefore(errorDiv, wrapper.firstChild);
                    };

                    const idLabel = document.createElement('div');
                    idLabel.className = 'visualizer-item-id text-[9px] font-mono text-zinc-400 dark:text-lumia-muted uppercase mt-2 w-full truncate text-center select-all';
                    idLabel.innerText = cleanId;

                    wrapper.appendChild(img);
                    wrapper.appendChild(idLabel);
                    rowFlex.appendChild(wrapper);
                });

                rowWrapper.appendChild(rowFlex);
                rowBlock.appendChild(rowWrapper);
                gallery.appendChild(rowBlock);
            });

        } catch (e) {
            alert('Invalid Array format. Ensure brackets and quotes match properly.');
        }
    }

    async function copyRowToClipboard(rowFlexElement) {
        const imgs = Array.from(rowFlexElement.querySelectorAll('img')).filter(img => img.style.display !== 'none' && !img.classList.contains('img-error'));

        if (imgs.length === 0) {
            alert('No valid images in this row to copy.');
            return;
        }

        const targetHeight = 300;
        let totalWidth = 0;

        const imageDimensions = imgs.map(img => {
            const aspect = img.naturalWidth / img.naturalHeight || 1;
            const calculatedWidth = targetHeight * aspect;
            totalWidth += calculatedWidth;
            return { img, width: calculatedWidth };
        });

        const canvas = document.createElement('canvas');
        canvas.width = totalWidth;
        canvas.height = targetHeight;
        const ctx = canvas.getContext('2d');

        let currentX = 0;
        imageDimensions.forEach(item => {
            ctx.drawImage(item.img, currentX, 0, item.width, targetHeight);
            currentX += item.width;
        });

        try {
            canvas.toBlob(async (blob) => {
                if (!blob) {
                    alert('Failed to generate image blob.');
                    return;
                }
                const data = [new ClipboardItem({ [blob.type]: blob })];
                await navigator.clipboard.write(data);
                alert('Outfit copied to clipboard!');
            }, 'image/png');
        } catch (err) {
            console.error(err);
            alert('Unable to copy. Ensure your browser permissions grant clipboard access.');
        }
    }

    async function copyRowIdsToJSON(rowFlexElement, btnElement) {
        const idElements = Array.from(rowFlexElement.querySelectorAll('.visualizer-item-id'));
        const ids = idElements.map(el => el.innerText.toLowerCase().trim()).filter(id => id);

        if (ids.length === 0) {
            alert('No valid cloth IDs found in this row.');
            return;
        }

        const generatedUuid = typeof crypto.randomUUID === 'function' ? crypto.randomUUID() : 'outfit-' + Math.random().toString(36).substring(2, 15);
        const structure = {
            [generatedUuid]: {
                "clothes": ids
            }
        };

        const jsonFormattedText = JSON.stringify(structure, null, 2);

        try {
            await navigator.clipboard.writeText(jsonFormattedText);
            const originalText = btnElement.innerText;
            btnElement.innerText = 'COPIED JSON';
            setTimeout(() => {
                btnElement.innerText = originalText;
            }, 1000);
        } catch (err) {
            console.error('Failed to copy text configuration: ', err);
            alert('Unable to copy JSON. Check browser clipboard permissions.');
        }
    }

    initializeArchive();
</script>
</body>
</html>
