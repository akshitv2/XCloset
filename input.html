<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Generator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .btn-container {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        button {
            padding: 10px 15px;
            background-color: #0070f3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0051a8;
        }
        #copyBtn {
            background-color: #2e7d32;
        }
        #copyBtn:hover {
            background-color: #1b5e20;
        }
        pre {
            background-color: #f4f4f4;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

<h2>Item Data Generator</h2>

<form id="dataForm">
    <div class="form-group">
        <label for="type">Type:</label>
        <input type="text" id="type" required placeholder="e.g., jeans">
    </div>
    <div class="form-group">
        <label for="color">Color:</label>
        <input type="text" id="color" required placeholder="e.g., white">
    </div>
    <div class="form-group">
        <label for="brand">Brand:</label>
        <input type="text" id="brand" required placeholder="e.g., Arrow">
    </div>
    <div class="form-group">
        <label for="occasion">Occasion:</label>
        <input type="text" id="occasion" required placeholder="e.g., casual">
    </div>
    <div class="form-group">
        <label for="image">Image:</label>
        <input type="file" id="image" accept="image/*" required>
    </div>
    <div class="btn-container">
        <button type="submit">Generate</button>
        <button type="button" id="copyBtn">Copy Output</button>
    </div>
</form>

<h3>Output:</h3>
<pre id="output">// Generated data will appear here</pre>

<script>
    document.getElementById('dataForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const type = document.getElementById('type').value;
        const color = document.getElementById('color').value;
        const brand = document.getElementById('brand').value;
        const occasion = document.getElementById('occasion').value;
        const imageFile = document.getElementById('image').files[0];

        if (!imageFile) return;

        const reader = new FileReader();
        reader.onloadend = function() {
            const uuid = self.crypto.randomUUID();
            const base64String = reader.result;

            // Create the inner object
            const innerObject = {
                "type": type,
                "image": base64String,
                "color": color,
                "brand": brand,
                "occasion": occasion
            };

            // Format the object to JSON string with indentation
            const innerJsonString = JSON.stringify(innerObject, null, 2);

            // Indent the inner lines to match the key placement
            const indentedInner = innerJsonString.split('\n').map((line, index) => {
                if (index === 0) return line;
                return '  ' + line;
            }).join('\n');

            // Construct final string without outer wrapping braces
            const finalOutput = `"${uuid}": ${indentedInner}`;

            document.getElementById('output').textContent = finalOutput;
        };

        reader.readAsDataURL(imageFile);
    });

    document.getElementById('copyBtn').addEventListener('click', function() {
        const outputText = document.getElementById('output').textContent;

        navigator.clipboard.writeText(outputText).then(() => {
            const originalText = this.textContent;
            this.textContent = 'Copied!';
            setTimeout(() => {
                this.textContent = originalText;
            }, 2000);
        }).catch(err => {
            console.error('Failed to copy text: ', err);
        });
    });
</script>

</body>
</html>
